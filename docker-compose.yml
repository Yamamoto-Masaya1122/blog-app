version: '3.8'

services:
  app:
    build:
      context: .
    container_name: blog-app
    ports:
      - "3000:3000"
    volumes:
      # ソースコードをマウント（ホットリロード対応）
      - ./:/app
      # node_modulesを永続化（ホストのnode_modulesと競合しないように）
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
  prisma-studio:
    build:
      context: .
    container_name: blog-app-prisma-studio
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: npx prisma studio --port 5555 --browser none
    depends_on:
      - app

volumes:
  node_modules: